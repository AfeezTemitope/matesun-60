<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Chocolate brown background with rounded corners -->
  <rect width="64" height="64" rx="12" fill="#5d3720"/>
  <!-- Inner subtle gold border -->
  <rect x="3" y="3" width="58" height="58" rx="10" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
  <!-- "60" in Great Vibes cursive style (approximated as bold italic) -->
  <text
    x="32"
    y="46"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="bold"
    font-size="42"
    fill="#d4af37"
    text-anchor="middle"
  >60</text>
</svg>
